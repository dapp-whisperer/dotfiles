# Single c copies file path immediately (no menu)
[[mgr.prepend_keymap]]
on   = "c"
run  = "copy path"
desc = "Copy the file path"

# Move copy menu to C (Shift+c)
[[mgr.prepend_keymap]]
on   = ["C", "c"]
run  = "copy path"
desc = "Copy the file path"

[[mgr.prepend_keymap]]
on   = ["C", "d"]
run  = "copy dirname"
desc = "Copy the directory path"

[[mgr.prepend_keymap]]
on   = ["C", "f"]
run  = "copy filename"
desc = "Copy the filename"

[[mgr.prepend_keymap]]
on   = ["C", "n"]
run  = "copy name_without_ext"
desc = "Copy the filename without extension"

[[mgr.prepend_keymap]]
on   = "F"
run  = 'shell "open -R $@" --confirm'
desc = "Reveal in Finder"

[[mgr.prepend_keymap]]
on   = "T"
run  = '''shell 'bash ~/.config/yazi/scripts/open-typora.sh "$@"' '''
desc = "Open in Typora"

[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = '''shell 'bash ~/.config/yazi/scripts/open-editor.sh "$@"' --block'''
desc = "Open in floating pane (90%)"

[[mgr.prepend_keymap]]
on   = "e"
run  = '''shell 'glow -p -w 80 "$@"' --block'''
desc = "View with glow"

[[mgr.prepend_keymap]]
on   = ["g", "n"]
run  = 'shell "nvim ." --block'
desc = "Open nvim in current directory"

[[mgr.prepend_keymap]]
on   = ["g", "z"]
run  = "plugin zoxide"
desc = "Jump to directory (zoxide)"

[[mgr.prepend_keymap]]
on   = ["g", "i"]
run  = "plugin lazygit"
desc = "Open lazygit"

[[mgr.prepend_keymap]]
on   = ["g", "/"]
run  = "cd /"
desc = "Go to root directory"
