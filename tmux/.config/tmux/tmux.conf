# --- GENERAL -------------------------------------------------------------------

# terminal capabilities for modern TUIs (Yazi, Neovim, etc.)
set-option -g default-terminal "tmux-256color"
set-option -s default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# mouse
set -g mouse on

# set terminal tab title (e.g. Ghostty tabs)
set -g set-titles on
set -g set-titles-string "#S | #W: #{b:pane_current_path}"

# Allow passthrough for image rendering (Claude Code, etc.)
set -g allow-passthrough on

# OSC 8 hyperlinks (clickable file paths in Claude Code, etc.)
set -as terminal-features ",*:hyperlinks"

# OSC 52 clipboard passthrough
set -g set-clipboard on

# extended keys — pass through Shift+Enter, Ctrl+J, etc. to apps
# "always" forwards extkeys even if the app does not explicitly request them.
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features ",*:extkeys"

# vi copy mode
setw -g mode-keys vi

# activity monitoring
set -g monitor-activity on
set -g visual-activity off
set -g bell-action any

# Disable focus events — prevents agents (Claude Code, etc.) from emitting
# BEL-terminated escape sequences on focus-out, which Ghostty shows as bell icons.
set -g focus-events off

# scrollback buffer
set -g history-limit 1000000

# window indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-option -wg automatic-rename off

# --- PREFIX --------------------------------------------------------------------

set -g prefix C-b
set -g prefix2 C-Space

# --- KEYBINDINGS ---------------------------------------------------------------

# Alt-hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Shift-arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# split panes
bind h split-window -h
bind v split-window -v
bind -T prefix r split-window -h
bind -T prefix d split-window -v
unbind '"'
unbind %

# reload config (Shift+R)
bind -T prefix R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# --- PLUGINS -------------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# tmux-open
set -g @open 'e'
set -g @open-editor 'C-e'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dapp-whisperer/tmux-agent-indicator'
set -g @plugin 'niksingh710/minimal-tmux-status'

# --- APPEARANCE ----------------------------------------------------------------

# Theme colors — written by `theme` script, sourced for status bar + pane styling
source-file -q ~/.config/tmux/current-theme.conf

# --- PLUGIN CONFIGURATION ------------------------------------------------------

# tmux-thumbs
set -g @thumbs-key Space

# tmux-sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-filter-current 'false'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'

# tmux-fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt=" " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# tmux-agent-indicator
set -g @agent-indicator-notification-enabled 'off'

# minimal-tmux-status
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-indicator-str " #S "
set -g @minimal-tmux-status-right '#{agent_indicator} #{b:pane_current_path}  #(cd #{pane_current_path} && git branch --show-current 2>/dev/null) '
set -g status-right-length 200

# tmux-resurrect + tmux-continuum
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# --- INITIALIZE TPM (keep at very bottom) --------------------------------------

run '~/.config/tmux/plugins/tpm/tpm'

# --- POST-PLUGIN KEY OVERRIDES -------------------------------------------------

# Re-assert terminal profile in case plugins or source order reset it.
set-option -g default-terminal "tmux-256color"
set-option -s default-terminal "tmux-256color"

# detach (Shift+D; prefix+d is used for vertical split)
bind -T prefix D detach-client

# kill pane without confirmation (remap from default prefix+x prompt)
unbind -T prefix x
bind -T prefix x kill-pane

# Popup terminal (70% of screen, toggle with prefix+f or Alt+W)
bind f if-shell -F '#{==:#{session_name},popup}' 'kill-session -t popup' 'display-popup -w 70% -h 70% -d "#{pane_current_path}" -E "tmux new-session -A -s popup"'
bind -n M-w if-shell -F '#{==:#{session_name},popup}' 'kill-session -t popup' 'display-popup -w 70% -h 70% -d "#{pane_current_path}" -E "tmux new-session -A -s popup"'

# Lazygit popup (Alt+G)
bind -n M-g display-popup -w 80% -h 80% -d "#{pane_current_path}" -E "lazygit"

# Yazi popup (Alt+Y)
bind -n M-y display-popup -w 80% -h 80% -d "#{pane_current_path}" -E "yazi"

# rename window with empty prompt (no pre-filled text)
bind , command-prompt -p "(rename-window)" -I "" "rename-window '%%'"

# Inner tabs — launch nested tmux session in current pane
bind T send-keys 'tmux2' Enter
