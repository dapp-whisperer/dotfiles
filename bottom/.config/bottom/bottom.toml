# bottom (btm) configuration
# Layout: compact top bar (CPU, mem, disk, net) + full-width process list
# Theme: Catppuccin Mocha

[flags]
rate = 1000
default_widget_type = "proc"
hide_time = true

[processes]
columns = ["PID", "Name", "CPU%", "Mem%", "Read", "Write", "TRead", "TWrite", "State", "User"]

# Layout: 2-row top (CPU+Net, Mem+Disk), full-width process below
[[row]]
  ratio = 1
  [[row.child]]
    ratio = 3
    type = "cpu"
  [[row.child]]
    ratio = 1
    type = "net"

[[row]]
  ratio = 1
  [[row.child]]
    ratio = 1
    type = "mem"
  [[row.child]]
    ratio = 1
    type = "disk"

[[row]]
  ratio = 3
  [[row.child]]
    type = "proc"

# Catppuccin Mocha theme
[styles]
[styles.tables]
  headers = { color = "#cdd6f4", bold = true }

[styles.cpu]
  all_entry_color = "#f5e0dc"
  avg_entry_color = "#f38ba8"
  cpu_core_colors = [
    "#89b4fa", "#a6e3a1", "#f9e2af", "#fab387",
    "#f38ba8", "#cba6f7", "#94e2d5", "#74c7ec",
    "#f5c2e7", "#b4befe", "#89dceb", "#eba0ac",
  ]

[styles.memory]
  ram_color = "#a6e3a1"
  cache_color = "#f9e2af"
  swap_color = "#fab387"
  arc_color = "#74c7ec"
  gpu_colors = ["#cba6f7", "#89b4fa", "#94e2d5", "#f5c2e7"]

[styles.network]
  rx_color = "#a6e3a1"
  tx_color = "#f38ba8"
  rx_total_color = "#94e2d5"
  tx_total_color = "#eba0ac"

[styles.widgets]
  border_color = "#585b70"
  selected_border_color = "#89b4fa"
  widget_title = { color = "#cdd6f4", bold = true }
  text = { color = "#cdd6f4" }
  selected_text = { color = "#1e1e2e", bg_color = "#89b4fa" }
  disabled_text = { color = "#6c7086" }
