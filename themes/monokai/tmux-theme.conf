# vim:set ft=tmux:

# --> Monokai
set -ogq @thm_bg "#272822"
set -ogq @thm_fg "#f8f8f2"

# Colors
set -ogq @thm_rosewater "#fd971f"
set -ogq @thm_flamingo "#f92672"
set -ogq @thm_pink "#f92672"
set -ogq @thm_mauve "#ae81ff"
set -ogq @thm_red "#f92672"
set -ogq @thm_maroon "#f92672"
set -ogq @thm_peach "#fd971f"
set -ogq @thm_yellow "#e6db74"
set -ogq @thm_green "#a6e22e"
set -ogq @thm_teal "#66d9ef"
set -ogq @thm_sky "#66d9ef"
set -ogq @thm_sapphire "#66d9ef"
set -ogq @thm_blue "#66d9ef"
set -ogq @thm_lavender "#ae81ff"

# Surfaces and overlays
set -ogq @thm_subtext_1 "#f8f8f2"
set -ogq @thm_subtext_0 "#75715e"
set -ogq @thm_overlay_2 "#75715e"
set -ogq @thm_overlay_1 "#49483e"
set -ogq @thm_overlay_0 "#3e3d32"
set -ogq @thm_surface_2 "#49483e"
set -ogq @thm_surface_1 "#3e3d32"
set -ogq @thm_surface_0 "#3b3a32"
set -ogq @thm_mantle "#1e1f1c"
set -ogq @thm_crust "#1e1f1c"

# Outer status bar (minimal-tmux-status plugin)
set -g @minimal-tmux-bg "#ae81ff"
set -g @minimal-tmux-fg "#1e1f1c"

# Pane borders and copy-mode highlight
set -g pane-border-style "fg=#49483e"
set -g pane-active-border-style "fg=#ae81ff"
set -g mode-style "bg=#3e3d32,fg=#f8f8f2"
