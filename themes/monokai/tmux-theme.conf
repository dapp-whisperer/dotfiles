# vim:set ft=tmux:

# --> Monokai Pro
set -ogq @thm_bg "#2d2a2e"
set -ogq @thm_fg "#fcfcfa"

# Colors
set -ogq @thm_rosewater "#fc9867"
set -ogq @thm_flamingo "#ff6188"
set -ogq @thm_pink "#ff6188"
set -ogq @thm_mauve "#ab9df2"
set -ogq @thm_red "#ff6188"
set -ogq @thm_maroon "#ff6188"
set -ogq @thm_peach "#fc9867"
set -ogq @thm_yellow "#ffd866"
set -ogq @thm_green "#a9dc76"
set -ogq @thm_teal "#78dce8"
set -ogq @thm_sky "#78dce8"
set -ogq @thm_sapphire "#78dce8"
set -ogq @thm_blue "#78dce8"
set -ogq @thm_lavender "#ab9df2"

# Surfaces and overlays
set -ogq @thm_subtext_1 "#fcfcfa"
set -ogq @thm_subtext_0 "#727072"
set -ogq @thm_overlay_2 "#727072"
set -ogq @thm_overlay_1 "#5b595c"
set -ogq @thm_overlay_0 "#403e41"
set -ogq @thm_surface_2 "#5b595c"
set -ogq @thm_surface_1 "#403e41"
set -ogq @thm_surface_0 "#363438"
set -ogq @thm_mantle "#221f22"
set -ogq @thm_crust "#221f22"

# Outer status bar (minimal-tmux-status plugin)
set -g @minimal-tmux-bg "#ab9df2"
set -g @minimal-tmux-fg "#221f22"

# Pane borders and copy-mode highlight
set -g pane-border-style "fg=#5b595c"
set -g pane-active-border-style "fg=#ab9df2"
set -g mode-style "bg=#403e41,fg=#fcfcfa"
