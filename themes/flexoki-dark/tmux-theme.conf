# vim:set ft=tmux:

# --> Flexoki Dark
set -ogq @thm_bg "#100f0f"
set -ogq @thm_fg "#cecdc3"

# Colors
set -ogq @thm_rosewater "#da702c"
set -ogq @thm_flamingo "#d14d41"
set -ogq @thm_pink "#ce5d97"
set -ogq @thm_mauve "#8b7ec8"
set -ogq @thm_red "#d14d41"
set -ogq @thm_maroon "#af3029"
set -ogq @thm_peach "#da702c"
set -ogq @thm_yellow "#d0a215"
set -ogq @thm_green "#879a39"
set -ogq @thm_teal "#3aa99f"
set -ogq @thm_sky "#3aa99f"
set -ogq @thm_sapphire "#4385be"
set -ogq @thm_blue "#4385be"
set -ogq @thm_lavender "#8b7ec8"

# Surfaces and overlays
set -ogq @thm_subtext_1 "#b7b5ac"
set -ogq @thm_subtext_0 "#878580"
set -ogq @thm_overlay_2 "#6f6e69"
set -ogq @thm_overlay_1 "#575653"
set -ogq @thm_overlay_0 "#403e3c"
set -ogq @thm_surface_2 "#343331"
set -ogq @thm_surface_1 "#282726"
set -ogq @thm_surface_0 "#1c1b1a"
set -ogq @thm_mantle "#1c1b1a"
set -ogq @thm_crust "#100f0f"

# Outer status bar (minimal-tmux-status plugin)
set -g @minimal-tmux-bg "#4385be"
set -g @minimal-tmux-fg "#100f0f"

# Pane borders and copy-mode highlight
set -g pane-border-style "fg=#575653"
set -g pane-active-border-style "fg=#4385be"
set -g mode-style "bg=#403e3c,fg=#cecdc3"
